name: Run Backtest

on: [push]

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run your trading strategy
        run: python backtest.py
